<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código QR de Asistencia</title>
    <link rel="stylesheet" href="./css/bootstrap/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="./css/bootstrap/css/style.css">
</head>
<body class="bg-white d-flex align-items-center min-vh-100">

    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5 p-4">

                <h2 class="fw-bold text-dark mb-2">Código QR de Asistencia</h2>
                <p class="text-secondary">Escanea para registrar asistencia</p>
                <h5 class="text-muted mb-4" id="tvFechaQR">Cargando fecha...</h5>

                <div class="d-inline-block p-3 bg-white border border-secondary border-opacity-25 rounded-4 shadow-sm mb-4">
                    <img id="imgCodigoQR" src="" alt="Código QR Dinámico" class="img-fluid" style="width: 250px; height: 250px;">
                </div>

                <p class="fw-bold text-dark mb-4" id="tvClaseInfo">Cargando materia...</p>
                
                <div>
                    <a href="menu.html" class="btn-img">
                        <img src="css/bootstrap/img/feedback.png" alt="Regresar" style="width: 60px;">
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="js/generar_qr.js"></script>
</body>
</html>
