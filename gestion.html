<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Asistencias</title>
    <link rel="stylesheet" href="./css/bootstrap/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-light">

    <div class="container py-4">
        
        <h2 class="text-center fw-bold text-dark mb-4">Gestión de Asistencias</h2>

        <div class="row justify-content-center">
            <div class="col-12 col-lg-8" id="recyclerViewAsistencias">

                <div class="card mb-3 shadow-sm border-0 rounded-3">
                    <div class="card-body p-3">
                        <div class="row align-items-center">
                            
                            <div class="col-6 col-md-7">
                                <h6 class="mb-0 fw-bold text-truncate text-dark">Nombre del Alumno</h6>
                                <small class="text-muted">201912345</small>
                            </div>

                            <div class="col-4 col-md-3 text-end">
                                <div class="text-dark" style="font-size: 0.85rem;">10/05/2026</div>
                                <div class="fw-bold" style="color: #009688; font-size: 0.85rem;">08:30 AM</div>
                            </div>

                            <div class="col-2 col-md-2 d-flex flex-column align-items-center justify-content-center">
                                <button class="btn btn-sm btn-link p-0 text-warning mb-1" title="Editar">
                                    <i class="bi bi-pencil-square fs-5"></i>
                                </button>
                                <button class="btn btn-sm btn-link p-0 text-danger" title="Eliminar">
                                    <i class="bi bi-trash-fill fs-5"></i>
                                </button>
                            </div>

                        </div>
                    </div>
                </div>
                <div class="card mb-3 shadow-sm border-0 rounded-3">
                    <div class="card-body p-3">
                        <div class="row align-items-center">
                            <div class="col-6 col-md-7">
                                <h6 class="mb-0 fw-bold text-truncate text-dark">María González Pérez</h6>
                                <small class="text-muted">202054321</small>
                            </div>
                            <div class="col-4 col-md-3 text-end">
                                <div class="text-dark" style="font-size: 0.85rem;">10/05/2026</div>
                                <div class="fw-bold" style="color: #009688; font-size: 0.85rem;">08:35 AM</div>
                            </div>
                            <div class="col-2 col-md-2 d-flex flex-column align-items-center justify-content-center">
                                <button class="btn btn-sm btn-link p-0 text-warning mb-1"><i class="bi bi-pencil-square fs-5"></i></button>
                                <button class="btn btn-sm btn-link p-0 text-danger"><i class="bi bi-trash-fill fs-5"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <a href="nuevo_registro.html" class="fab-button">
        <i class="bi bi-plus-lg"></i>
