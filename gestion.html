<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Asistencias</title>
    <link rel="stylesheet" href="./css/bootstrap/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="./css/bootstrap/css/style.css">
</head>
<body class="bg-light gestion-page">

    <div class="container py-4">

        <h2 class="text-center fw-bold text-dark mb-3">
            Gestión de Asistencias
        </h2>

        <div class="text-center mb-4">
            <img src="css/bootstrap/img/management.png"
                 alt="Asistencias"
                 class="img-fluid gestion-img">
        </div>

        <div class="asistencia-container">

            <div id="recyclerViewAsistencias">

                <div class="asistencia-item">

                    <div class="row align-items-center">

                        <div class="col-6 col-md-7">

                            <h6 class="mb-0 fw-bold text-dark">
                                Nombre del Alumno
                            </h6>

                            <small class="text-muted">
                                201912345
                            </small>

                        </div>

                        <div class="col-4 col-md-3 text-end">

                            <div class="text-dark fecha-asistencia">
                                10/05/2026
                            </div>

                            <div class="hora-asistencia">
                                08:30 AM
                            </div>

                        </div>

                        <div class="col-2 col-md-2 d-flex flex-column align-items-center justify-content-center">

                            <button class="btn btn-sm btn-link p-0 text-warning mb-1">
                                <i class="bi bi-pencil-square fs-5"></i>
                            </button>

                            <button class="btn btn-sm btn-link p-0 text-danger">
                                <i class="bi bi-trash-fill fs-5"></i>
                            </button>

                        </div>

                    </div>

                </div>

                <div class="asistencia-item">

                    <div class="row align-items-center">

                        <div class="col-6 col-md-7">

                            <h6 class="mb-0 fw-bold text-dark">
                                María González Pérez
                            </h6>

                            <small class="text-muted">
                                202054321
                            </small>

                        </div>

                        <div class="col-4 col-md-3 text-end">

                            <div class="text-dark fecha-asistencia">
                                11/05/2026
                            </div>

                            <div class="hora-asistencia">
                                09:10 AM
                            </div>

                        </div>

                        <div class="col-2 col-md-2 d-flex flex-column align-items-center justify-content-center">

                            <button class="btn btn-sm btn-link p-0 text-warning mb-1">
                                <i class="bi bi-pencil-square fs-5"></i>
                            </button>

                            <button class="btn btn-sm btn-link p-0 text-danger">
                                <i class="bi bi-trash-fill fs-5"></i>
                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>
        <div class="row g-3 acciones-bottom">
            <div class="col-6 text-start">
                <a href="menu.html"
                class="btn btn-danger btn-salir">
                    <i class="bi bi-box-arrow-left me-2"></i>
                    Salir
                </a>
            </div>
            <div class="col-6 text-end">
                <a href="nuevo_registro.html"
                class="btn btn-success btn-nuevo">
                    <i class="bi bi-plus-square me-2"></i>
                    Nuevo Registro
                </a>
            </div>

        </div>

    </div>
</body>
</html>
