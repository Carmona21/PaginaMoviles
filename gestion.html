<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Asistencias</title>
    <link rel="stylesheet" href="./css/bootstrap/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="./css/bootstrap/css/style.css">
</head>
<body class="bg-light gestion-page">

    <div class="container py-4">

        <h2 class="text-center fw-bold text-dark mb-1" id="tvGestionTitulo">Gestión de Asistencias</h2>
        <p class="text-center text-secondary mb-3" id="tvGestionSubtitulo">Cargando clase...</p>

        <div class="text-center mb-4">
            <img src="css/bootstrap/img/management.png" alt="Asistencias" class="img-fluid gestion-img" style="max-height: 120px;">
        </div>

        <div class="mb-4 d-flex align-items-center justify-content-center">
            <label class="form-label me-2 mb-0 fw-bold text-secondary">Fecha:</label>
            <input type="date" id="inputFiltroFecha" class="form-control shadow-sm border-0 rounded-3" style="max-width: 200px;">
        </div>

        <div class="asistencia-container mb-4">
            <div id="recyclerViewAsistencias">
                <div class="text-center text-muted py-4">Cargando registros...</div>
            </div>
        </div>

        <div class="row g-3 acciones-bottom mt-2">
            <div class="col-6 text-start">
                <a href="menu.html" class="btn btn-danger btn-salir w-100 py-2 rounded-4 shadow-sm">
                    <i class="bi bi-box-arrow-left me-2"></i> Salir
                </a>
            </div>
            <div class="col-6 text-end">
                <a href="nuevo_registro.html" class="btn btn-success btn-nuevo w-100 py-2 rounded-4 shadow-sm">
                    <i class="bi bi-plus-square me-2"></i> Nuevo Registro
                </a>
            </div>
        </div>

    </div>

    <div class="modal fade" id="modalEliminarAsistencia" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow rounded-4 text-dark text-center p-3">
                <div class="modal-body py-4">
                    <i class="bi bi-trash3-fill text-danger mb-3" style="font-size: 3rem;"></i>
                    <h4 class="fw-bold">¿Eliminar Asistencia?</h4>
                    <p class="text-secondary mt-2" id="txtMensajeEliminarAsistencia">¿Seguro que deseas remover este registro?</p>
                </div>
                <div class="modal-footer border-0 pt-0 justify-content-center">
                    <button type="button" class="btn btn-outline-secondary rounded-4 px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="btnConfirmarEliminarAsistencia" class="btn btn-danger rounded-4 px-4">Sí, eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/gestion.js"></script>
</body>
</html>
