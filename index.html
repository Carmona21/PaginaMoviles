<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencia QR</title>
    <link rel="stylesheet" href="./css/bootstrap/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">

                <div class="d-flex justify-content-center mb-4">
                    <dotlottie-wc
                        src="https://lottie.host/d86e5cb1-53d2-4bf0-a016-d834de12b962/UnaBpGtLfQ.lottie"
                        style="width: 100%; max-width: 300px; height: auto;"
                        autoplay
                        loop
                    ></dotlottie-wc>
                </div>

                <div class="card card-custom bg-white">
                    <div class="card-body p-5">
                        
                        <h2 class="text-center fw-bold mb-5">Inicio de sesión</h2>

                        <form id="loginForm" action="menu.html">
                            <div class="input-group mb-4">
                                <span class="input-group-text bg-white border-end-0 rounded-start-4"><i class="bi bi-person fs-5"></i></span>
                                <input type="email" class="form-control input-custom border-start-0 ps-0" id="etCorreoLogin" placeholder="Correo electrónico" required>
                            </div>

                            <div class="input-group mb-4">
                                <span class="input-group-text bg-white border-end-0 rounded-start-4"><i class="bi bi-lock fs-5"></i></span>
                                <input type="password" class="form-control input-custom border-start-0 ps-0" id="etPassLogin" placeholder="Contraseña" required>
                            </div>

                            <button type="submit" class="btn btn-dark btn-custom w-100 mt-3 mb-4">Iniciar sesión</button>

                            <div class="text-center">
                                <a href="registro.html" class="text-dark fw-bold text-decoration-none">¿No tienes cuenta? Regístrate aquí</a>
                            </div>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/login.js"></script>
    <script
        src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js"
        type="module"
    ></script>
</body>
</html>
