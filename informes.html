<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informes y Estadísticas</title>
    <link rel="stylesheet" href="./css/bootstrap/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="./css/bootstrap/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-white informes-page">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">

                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark mb-2" id="tvTituloClase">
                        Informes y Estadísticas
                    </h2>
                    <p class="text-muted" id="tvSubtituloInforme">
                        Resumen general de asistencias
                    </p>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <div class="card border-0 shadow rounded-4 asistencia-card h-100" style="background-color: #28a745;">
                            <div class="card-body d-flex flex-column justify-content-center align-items-center text-center">
                                <h1 class="fw-bold text-white mb-1" id="tvPorcentajeAsistencias">
                                    0%
                                </h1>
                                <p class="text-white mb-0">
                                    Asistencias
                                </p>
                            </div>
                        </div>
                    </div>

                    <div class="col-6">
                        <div class="card border-0 shadow rounded-4 faltas-card h-100" style="background-color: #dc3545;">
                            <div class="card-body d-flex flex-column justify-content-center align-items-center text-center">
                                <h1 class="fw-bold text-white mb-1" id="tvPorcentajeFaltas">
                                    0%
                                </h1>
                                <p class="text-white mb-0">
                                    Faltas
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow rounded-4 p-4 mb-4">
                    <h5 class="fw-bold mb-3 text-center">
                        Distribución de asistencia
                    </h5>
                    <div class="grafica-container d-flex justify-content-center" style="position: relative; height:300px; width:100%">
                        <canvas id="graficaPastel"></canvas>
                    </div>
                </div>

                <div class="text-center">
                    <a href="menu.html" class="btn btn-primary btn-lg rounded-4 px-5">
                        <i class="bi bi-arrow-left-circle me-2"></i> Atrás
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script type="module" src="js/informes.js"></script>
</body>
</html>
