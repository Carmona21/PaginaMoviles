<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informes y Estadísticas</title>
    <link rel="stylesheet" href="./css/bootstrap/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="./css/bootstrap/css/style.css">
</head>
<body class="bg-white informes-page">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">

                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark mb-2">
                        Informes y Estadísticas
                    </h2>
                    <p class="text-muted">
                        Resumen general de asistencias
                    </p>
                </div>

                <div class="row g-3 mb-4">
                    <!-- ASISTENCIAS -->
                    <div class="col-6">
                        <div class="card border-0 shadow rounded-4 asistencia-card h-100">
                            <div class="card-body d-flex flex-column justify-content-center align-items-center text-center">
                                <h1 class="fw-bold text-white mb-1">
                                    85%
                                </h1>
                                <p class="text-white mb-0">
                                    Asistencias
                                </p>
                            </div>
                        </div>
                    </div>

                    <!-- FALTAS -->
                    <div class="col-6">
                        <div class="card border-0 shadow rounded-4 faltas-card h-100">
                            <div class="card-body d-flex flex-column justify-content-center align-items-center text-center">
                                <h1 class="fw-bold text-white mb-1">
                                    15%
                                </h1>
                                <p class="text-white mb-0">
                                    Faltas
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- GRAFICA -->
                <div class="card border-0 shadow rounded-4 p-4 mb-4">
                    <h5 class="fw-bold mb-3">
                        Distribución de asistencia
                    </h5>
                    <div class="grafica-container">
                        <canvas id="graficaPastel"></canvas>
                    </div>
                </div>

                <div class="text-center">
                    <a href="menu.html" class="btn btn-primary btn-lg rounded-4 px-4">
                        Atrás
                    </a>
                </div>

            </div>

        </div>

    </div>

</body>
</html>
