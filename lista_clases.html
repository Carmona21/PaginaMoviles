<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Clases Asignadas</title>

    <link rel="stylesheet" href="./css/bootstrap/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="./css/bootstrap/css/style.css">
</head>

<body class="bg-light gestion-page">

    <div class="container py-4">

        <h2 class="text-center fw-bold text-dark mb-3">
            Mis Clases Asignadas
        </h2>

        <div class="text-center mb-4">
            <img src="css/bootstrap/img/elearning.png"
                 alt="Clases"
                 class="img-fluid gestion-img">
        </div>

        <div class="clases-container">

            <div id="contenedorClases">

                <div class="clase-item">

                    <div class="row align-items-center">

                        <div class="col-8">

                            <h4 class="fw-bold text-dark mb-4">
                                Materia
                            </h4>

                            <p class="mb-2 text-secondary">
                                NRC: 00000
                            </p>

                            <p class="mb-0 text-secondary">
                                Horario
                            </p>

                        </div>

                        <div class="col-4 text-end">

                            <div class="mb-4">

                                <button class="btn btn-link text-warning p-0 me-3">
                                    <i class="bi bi-pencil-fill fs-4"></i>
                                </button>

                                <button class="btn btn-link text-danger p-0">
                                    <i class="bi bi-trash-fill fs-4"></i>
                                </button>

                            </div>

                            <div class="fw-bold text-success inscritos-text">
                                Inscritos: 0
                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <div class="row g-3 acciones-bottom">

            <div class="col-6 text-start">

                <a href="menu.html"
                   class="btn btn-danger btn-salir">

                    <i class="bi bi-box-arrow-left me-2"></i>
                    Salir

                </a>

            </div>

            <div class="col-6 text-end">

                <a href="nueva_clase.html"
                   class="btn btn-success btn-nuevo">

                    <i class="bi bi-plus-square me-2"></i>
                    Nueva Clase

                </a>

            </div>

        </div>

    </div>

    <script type="module" src="js/lista_clases.js"></script>
     <script>
        function cerrarSesion() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
