<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="./css/bootstrap/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="./css/bootstrap/css/style.css">
</head>
<body class="dark-mode d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
                    
                    <h2 class="text-center fw-bold mb-4">Crear Cuenta</h2>

                    <div class="d-flex justify-content-center mb-4">
                        <dotlottie-wc
                            src="https://lottie.host/f5f46bef-3951-41d8-bd1f-b341afc05891/cPnMv07KzI.lottie"
                            style="width: 100%; max-width: 300px; height: auto;"
                            autoplay
                            loop
                        ></dotlottie-wc>
                    </div>

                    <form id="registroForm" novalidate>
                        <div class="mb-3">
                            <input type="text" class="form-control form-control-lg" id="etNombreRegistro" placeholder="Nombre completo" required>
                        </div>

                        <div class="mb-3">
                            <input type="email" class="form-control form-control-lg" id="etCorreoRegistro" placeholder="Correo electrónico" required>
                        </div>

                        <div class="mb-3">
                            <input type="password" class="form-control form-control-lg" id="etPassRegistro" placeholder="Contraseña" required>
                        </div>

                        <div class="mb-3">
                            <input type="text" id="etMatriculaRegistro" class="form-control form-control-lg" placeholder="Matrícula (9 dígitos)">
                        </div>


                        <p class="mb-2 mt-4">Selecciona tu rol:</p>
                        <div class="mb-3">
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="rolRadio" id="rbAlumno" checked>
                                <label class="form-check-label" for="rbAlumno">Alumno</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="rolRadio" id="rbMaestro">
                                <label class="form-check-label" for="rbMaestro">Maestro</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <input type="password" id="etCodigoMaestro" class="form-control mb-3" placeholder="Código de Maestro (123456)">
                        </div>

                        <button id="btnFinalizarRegistro" class="btn btn-success w-100 mt-2">Registrar</button>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/registro.js"></script>
    <script
        src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js"
        type="module"
    ></script>
</body>
</html>
